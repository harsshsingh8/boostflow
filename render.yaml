services:
  - type: web
    name: boostflow
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SMM_API_URL
        sync: false
      - key: SMM_API_KEY
        sync: false
      - key: SMM_SERVICE_ID
        sync: false
